# Mapping des LLM supportés + réglages par défaut
default:
  provider: gemini             # gemini | openai | deepseek
  model: gemini-2.0-flash
  temperature: 0.2
  max_output_tokens: 900
  retries: 4

providers:
  gemini:
    models:
      - gemini-2.0-flash
    # variables d'env requises: GEMINI_API_KEY
  openai:
    models:
      - gpt-4o-mini
      - gpt-4o
      - gpt-4.1-mini
    # variables d'env requises: OPENAI_API_KEY
  deepseek:
    models:
      - deepseek-chat
      - deepseek-coder
    # variables d'env requises: DEEPSEEK_API_KEY

presets:
  # règles système utilisées par l’orchestrateur selon l’agent
  rag_generic:
    provider: ${LLM_PROVIDER:-gemini}
    model: ${LLM_MODEL:-gemini-2.0-flash}
    temperature: 0.2
    max_output_tokens: 900
    system_rules: |
      Tu es un assistant d’entreprise pour un système RAG. Réponds STRICTEMENT aux SOURCES fournies.
      Interdis les références inline [n]; fournis un JSON {"answer": "...", "uses_context": true|false, "used_sources":[...]}.
  trading:
    provider: ${LLM_PROVIDER:-gemini}
    model: ${LLM_MODEL:-gemini-2.0-flash}
    temperature: 0.2
    max_output_tokens: 1100
    system_rules: |
      Assistant spécialisé trading & conformité. Réponds uniquement aux SOURCES.
      Sortie JSON {"answer": "...", "uses_context": true|false, "used_sources":[...]} sans markdown ni puces.
  prompt_only:
    provider: ${LLM_PROVIDER:-gemini}
    model: ${LLM_MODEL:-gemini-2.0-flash}
    temperature: 0.2
    max_output_tokens: 700
    system_rules: |
      Réponds en TEXTE BRUT, sans markdown, sans puces, sans titres. Pas de sources externes.
