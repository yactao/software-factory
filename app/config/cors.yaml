# Origines autorisées par environnement
defaults:
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

environments:
  local:
    allow_origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  prod:
    allow_origins:
      - https://app-rag-climmag-prod.azurewebsites.net
