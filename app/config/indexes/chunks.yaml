# Index RAG général (documents découpés en chunks)
name: idx-rag-chunks
query:
  type: semantic              # "semantic" ou "simple"
  semanticConfiguration: semantic-config
select:
  - id
  - title
  - content
  - path
  - source_path
  - metadata_title
  - "@search.rerankerScore"
  - "@search.score"
  - "@search.captions"
answers:
  enabled: true               # answers extractives Azure Search
  count: 3
captions:
  enabled: true               # captions extractives
thresholds:
  reranker_min: 1.2
  bm25_min: 1.0
filters_supported:
  - path_prefix
  - tenant_id
  - eq
  - any_in
